<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>HEALINK - Teka Emosi</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center text-white">

<div class="bg-white text-gray-800 p-8 rounded-2xl shadow-xl w-[90%] max-w-md text-center relative">

  <!-- CLOSE -->
  <button onclick="goBack()" 
    class="absolute top-3 right-4 text-xl text-gray-500 hover:text-black">
    ✕
  </button>

  <h1 class="text-xl font-bold mb-2">🎭 Teka Emosi AI</h1>

  <!-- LEVEL -->
  <div class="flex justify-center gap-2 mb-3">
    <button onclick="setLevel('mudah')" class="px-3 py-1 bg-green-200 rounded">Mudah</button>
    <button onclick="setLevel('sederhana')" class="px-3 py-1 bg-yellow-200 rounded">Sederhana</button>
    <button onclick="setLevel('sukar')" class="px-3 py-1 bg-red-200 rounded">Sukar</button>
  </div>

  <!-- CATEGORY -->
  <div class="flex justify-center gap-2 mb-4 text-sm">
    <button onclick="setKategori('asas')" class="px-2 py-1 bg-gray-200 rounded">Asas</button>
    <button onclick="setKategori('sosial')" class="px-2 py-1 bg-gray-200 rounded">Sosial</button>
    <button onclick="setKategori('kompleks')" class="px-2 py-1 bg-gray-200 rounded">Kompleks</button>
  </div>

  <!-- EMOJI -->
  <div id="emoji" class="text-6xl mb-4"></div>

  <!-- OPTIONS -->
  <div id="options"></div>

  <!-- RESULT -->
  <p id="result" class="mt-4 font-semibold"></p>

  <!-- SCORE -->
  <p class="mt-3 text-sm">⭐ Skor: <span id="score">0</span></p>

</div>

<script>
const suara = window.speechSynthesis;

let level = "mudah";
let kategori = "asas";
let score = 0;

const data = {
mudah: [
{emoji:"😄", ans:"gembira", explain:"Ini menunjukkan kegembiraan."},
{emoji:"😢", ans:"sedih", explain:"Air mata tanda kesedihan."},
{emoji:"😡", ans:"marah", explain:"Muka merah tanda marah."}
],
sederhana: [
{emoji:"😟", ans:"risau", explain:"Wajah menunjukkan kebimbangan."},
{emoji:"😐", ans:"neutral", explain:"Tiada emosi jelas."}
],
sukar: [
{emoji:"😞", ans:"kecewa", explain:"Perasaan kecewa mendalam."},
{emoji:"😤", ans:"frustrasi", explain:"Menunjukkan tekanan tinggi."}
]
};

let current;

function speak(text){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ms-MY";
  suara.speak(utter);
}

function newRound(){
  const list = data[level];
  current = list[Math.floor(Math.random()*list.length)];

  document.getElementById("emoji").innerText = current.emoji;
  document.getElementById("result").innerText = "";

  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";

  ["gembira","sedih","marah","risau","neutral","kecewa","frustrasi"].forEach(opt=>{
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.className = "block w-full mb-2 bg-purple-100 p-2 rounded hover:bg-purple-200";
    btn.onclick = ()=>answer(opt);
    optDiv.appendChild(btn);
  });
}

function answer(pilih){

  disable();

  let msg;

  if(pilih === current.ans){
    msg = "Betul! " + current.explain;
    score += 10;
    document.getElementById("result").className="mt-4 text-green-600 font-semibold";
  } else {
    msg = "Salah! " + current.explain;
    document.getElementById("result").className="mt-4 text-red-600 font-semibold";
  }

  document.getElementById("result").innerText = msg;
  document.getElementById("score").innerText = score;

  speak(msg);

  setTimeout(()=>{
    enable();
    newRound();
  },2000);
}

function disable(){
  document.querySelectorAll("#options button").forEach(b=>b.disabled=true);
}

function enable(){
  document.querySelectorAll("#options button").forEach(b=>b.disabled=false);
}

function setLevel(l){
  level = l;
  newRound();
}

function setKategori(k){
  kategori = k;
  newRound();
}

function goBack(){
  window.location.href="../healink.html"; // balik ke dashboard
}

newRound();
</script>

<script>
function goBack(){
  window.history.back();
}

function closeGame(){
  window.location.href = "menu.html";
}
</script>

</body>

<!-- HEADER GAME -->
<div class="fixed top-0 left-0 w-full flex justify-between items-center px-4 py-3 bg-white/10 backdrop-blur text-white z-50">

  <!-- BACK -->
  <button onclick="goBack()" 
    class="bg-white/20 px-3 py-1 rounded hover:bg-white/30 transition">
    ← Kembali
  </button>

  <!-- TITLE -->
  <div class="font-semibold text-sm md:text-base">
    🎭 Teka Emosi
  </div>

  <!-- CLOSE -->
  <button onclick="closeGame()" 
    class="bg-red-500 px-3 py-1 rounded hover:bg-red-600 transition">
    ✕ Tutup
  </button>

</div>

</html>
