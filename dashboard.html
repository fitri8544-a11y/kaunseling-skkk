<body class="bg-gradient-to-r from-purple-700 to-blue-700 text-white min-h-screen p-6">

<!-- 🔐 LOGOUT BUTTON -->
<button onclick="logout()" 
class="fixed top-5 right-5 bg-red-500 hover:bg-red-600 
text-white px-4 py-2 rounded-lg shadow-lg 
hover:scale-105 transition duration-300 z-[9999]">

  🚪 Logout

</button>

  <!-- HEADER -->
  <div class="max-w-6xl mx-auto mb-6">
    <h1 class="text-3xl font-bold text-center">📊 Dashboard Aktiviti Pelajar</h1>
    <p class="text-center text-white/70 mt-1">Analisis penggunaan modul (Real-time)</p>
  </div>

  <!-- FILTER -->
  <div class="max-w-6xl mx-auto mb-6 grid md:grid-cols-3 gap-4">
    <div class="card">
      <label class="text-sm opacity-80">Dari</label>
      <input id="fromDate" type="date" class="w-full mt-1 p-2 rounded text-black">
    </div>
    <div class="card">
      <label class="text-sm opacity-80">Hingga</label>
      <input id="toDate" type="date" class="w-full mt-1 p-2 rounded text-black">
    </div>
    <div class="card flex items-end">
      <button onclick="applyFilter()" class="w-full bg-white/20 hover:bg-white/30 rounded-xl p-2">
        Tapis Data
      </button>
    </div>
  </div>

<!-- ================= PENGUNJUNG ================= -->
<div class="max-w-6xl mx-auto mt-6 section-box">

  <div class="section-title">👥 Analisis Pengunjung</div>

  <div class="grid md:grid-cols-2 gap-6 items-center">

    <!-- KPI -->
    <div class="grid grid-cols-3 gap-4 text-center">

      <div>
        <div class="text-sm text-white/70">👨‍🎓 Murid</div>
        <div id="kpiMurid" class="text-3xl font-bold">0</div>
      </div>

      <div>
        <div class="text-sm text-white/70">👨‍🏫 Guru</div>
        <div id="kpiGuru" class="text-3xl font-bold">0</div>
      </div>

      <div>
        <div class="text-sm text-white/70">👤 Pelawat</div>
        <div id="kpiPelawat" class="text-3xl font-bold">0</div>
      </div>

    </div>

    <!-- CHART -->
    <div class="h-44">
      <canvas id="visitorChart"></canvas>
    </div>

  </div>

</div>

  <!-- KPI -->
  <div class="max-w-6xl mx-auto section-box">

  <div class="section-title">📊 Ringkasan Sistem</div>

  <div class="grid md:grid-cols-4 gap-4 text-center">

    <div>
      <div class="text-xs text-white/70">Jumlah Interaksi</div>
      <div id="kpiTotal" class="text-2xl font-bold">0</div>
    </div>

    <div>
      <div class="text-xs text-white/70">Modul Aktif</div>
      <div id="kpiModules" class="text-2xl font-bold">0</div>
    </div>

    <div>
      <div class="text-xs text-white/70">Top Modul</div>
      <div id="kpiTop" class="text-2xl font-bold">-</div>
    </div>

    <div>
      <div class="text-xs text-white/70">Purata / Modul</div>
      <div id="kpiAvg" class="text-2xl font-bold">0</div>
    </div>

  </div>

</div>

<!-- CHART -->
<div class="max-w-6xl mx-auto mt-6 section-box">

  <div class="section-title">📈 Analisis Modul</div>

  <div class="grid md:grid-cols-2 gap-6 items-center">

    <div class="h-72 md:h-80">
      <canvas id="barChart"></canvas>
    </div>

    <div class="h-72 md:h-80">
      <canvas id="pieChart"></canvas>
    </div>

  </div>

</div>


<!-- ================= AKTIVITI LIVE ================= -->
<div class="max-w-6xl mx-auto mt-6 section-box">

  <div class="section-title">📋 Aktiviti Pengguna (Live)</div>

  <div id="activityList" 
       class="space-y-3 max-h-[300px] overflow-y-auto pr-2">
  </div>

</div>


<!-- ================= RANKING ================= -->
<div class="max-w-6xl mx-auto mt-6 section-box">

  <div class="section-title">🏆 Ranking Modul</div>

  <div id="ranking" class="grid md:grid-cols-3 gap-4"></div>

</div>
