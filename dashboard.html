<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<title>Dashboard Aktiviti Pelajar</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
  .card { @apply bg-white/20 border border-white/20 backdrop-blur-lg rounded-2xl p-5 shadow-lg; }
</style>
<style>
  body {
    color: #ffffff;
  }
</style>
<style>
.section-title {
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  color: rgba(255,255,255,0.95);
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}
.section-box {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(12px);
}
.sidebar-btn{
  width:100%;
  text-align:left;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
  background:rgba(255,255,255,0.05);
}
.sidebar-btn:hover{
  background:rgba(255,255,255,0.2);
}

.card{
  background: rgba(255,255,255,0.1);
  padding: 16px;
  border-radius: 16px;
}

.title{
  font-size:16px;
  font-weight:600;
  margin-bottom:10px;
}

.label{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body class="bg-gradient-to-br from-[#1e1b4b] via-purple-700 to-blue-600 text-white">

<div class="flex min-h-screen">

  <!-- ================= SIDEBAR ================= -->
<div class="w-64 bg-white/10 backdrop-blur-lg p-5 border-r border-white/10">

  <h2 class="text-xl font-bold mb-6">📊 Dashboard</h2>

  <!-- ================= SEKOLAH ================= -->
  <div class="mb-6">
    <div class="text-sm text-white/70 mb-2">🏫 Sekolah</div>

    <!-- 🔥 AUTO LOAD -->
    <div id="listSekolah" class="space-y-2"></div>
  </div>

  <!-- ================= KELAS ================= -->
  <div>
    <div class="text-sm text-white/70 mb-2">🎓 Kelas</div>

    <!-- 🔥 AUTO LOAD -->
    <div id="listKelas" class="space-y-2"></div>
  </div>

</div>

  <!-- ================= CONTENT ================= -->
  <div class="flex-1 p-6 space-y-6 overflow-y-auto">

    <!-- HEADER -->
    <div class="flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold">📊 Dashboard Aktiviti Pelajar</h1>
        <p class="text-white/70 text-sm">Analisis penggunaan modul (Real-time)</p>
      </div>

      <button onclick="logout()" 
        class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600">
        🚪 Logout
      </button>
    </div>

    <!-- FILTER TARIKH -->
    <div class="grid md:grid-cols-3 gap-4">
      <input id="fromDate" type="date" class="p-2 rounded text-black">
      <input id="toDate" type="date" class="p-2 rounded text-black">
      <button onclick="applyFilter()" 
        class="bg-white/20 rounded-lg hover:bg-white/30">
        Tapis Data
      </button>
    </div>

    <!-- ================= PENGUNJUNG ================= -->
    <div class="card">
      <div class="title">👥 Analisis Pengunjung</div>

      <div class="grid md:grid-cols-2 gap-6 items-center">

        <div class="grid grid-cols-3 text-center">
          <div>👨‍🎓 <br><b id="kpiMurid">0</b></div>
          <div>👨‍🏫 <br><b id="kpiGuru">0</b></div>
          <div>👤 <br><b id="kpiPelawat">0</b></div>
        </div>

        <div class="h-40">
          <canvas id="visitorChart"></canvas>
        </div>

      </div>
    </div>

    <!-- ================= KPI ================= -->
    <div class="grid md:grid-cols-4 gap-4">

      <div class="card text-center">
        <div class="label">Interaksi</div>
        <b id="kpiTotal">0</b>
      </div>

      <div class="card text-center">
        <div class="label">Modul Aktif</div>
        <b id="kpiModules">0</b>
      </div>

      <div class="card text-center">
        <div class="label">Top Modul</div>
        <b id="kpiTop">-</b>
      </div>

      <div class="card text-center">
        <div class="label">Purata</div>
        <b id="kpiAvg">0</b>
      </div>

    </div>

    <!-- ================= CHART ================= -->
    <div class="grid md:grid-cols-2 gap-6">

      <div class="card">
        <div class="title">📊 Bar Chart</div>
        <canvas id="barChart"></canvas>
      </div>

      <div class="card">
        <div class="title">📊 Pie Chart</div>
        <canvas id="pieChart"></canvas>
      </div>

    </div>

    <!-- ================= LIVE ================= -->
    <div class="card">
      <div class="title">📋 Aktiviti Pengguna (Live)</div>
      <div id="activityList" class="space-y-2 max-h-[300px] overflow-y-auto"></div>
    </div>

    <!-- ================= RANKING ================= -->
    <div class="card">
      <div class="title">🏆 Ranking Modul</div>
      <div id="ranking" class="grid md:grid-cols-3 gap-4"></div>
    </div>

  </div>

</div>

<script>
// 🔥 CONFIG (guna config cikgu)
const firebaseConfig = {
  apiKey: "AIzaSyA9R5jKqeJNvBHD-SIOuseAqyb_x909R3Q",
  authDomain: "bimbingankaunselingskkk.firebaseapp.com",
  projectId: "bimbingankaunselingskkk"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// STATE
let rawData = [];
let stats = {};
let barChart, pieChart;

// 📡 REALTIME LISTENER
db.collection("aktivitiPelajar").onSnapshot(snapshot => {
  rawData = [];
  snapshot.forEach(doc => rawData.push(doc.data()));
  computeAndRender();
});

// 🔎 FILTER TARIKH
function applyFilter(){
  computeAndRender();
}

function inRange(date){
  const from = document.getElementById('fromDate').value;
  const to   = document.getElementById('toDate').value;

  if(!from && !to) return true;

  const d = new Date(date?.seconds ? date.seconds*1000 : date);
  if(from){
    const f = new Date(from + "T00:00:00");
    if(d < f) return false;
  }
  if(to){
    const t = new Date(to + "T23:59:59");
    if(d > t) return false;
  }
  return true;
}

// 🧠 COMPUTE
function computeAndRender(){
  stats = {};
  let total = 0;

  rawData.forEach(d => {
    if(!inRange(d.masa)) return;

    const m = d.module || "Lain";
    if(!stats[m]) stats[m] = 0;
    stats[m]++;
    total++;
  });

  renderKPI(stats, total);
  renderCharts(stats);
  renderRanking(stats);
}

// 📊 KPI
function renderKPI(stats, total){
  const modules = Object.keys(stats).length;
  const sorted = Object.entries(stats).sort((a,b)=>b[1]-a[1]);
  const top = sorted[0]?.[0] || "-";
  const avg = modules ? Math.round(total/modules) : 0;

  document.getElementById("kpiTotal").innerText = total;
  document.getElementById("kpiModules").innerText = modules;
  document.getElementById("kpiTop").innerText = top;
  document.getElementById("kpiAvg").innerText = avg;
}

// 📈 CHART
function renderCharts(stats){
  const labels = Object.keys(stats);
  const data = Object.values(stats);

  // destroy lama
  if(barChart) barChart.destroy();
  if(pieChart) pieChart.destroy();

  // BAR
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Jumlah Klik',
        data
      }]
    },
   options: {
  plugins: {
    legend: {
      labels: {
        color: "#ffffff"
      }
    }
  },
  scales: {
    x: {
      ticks: { color: "#ffffff" }
    },
    y: {
      ticks: { color: "#ffffff" }
    }
  }
}
  });

  // PIE
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: {
      labels,
      datasets: [{ data }]
    }
  });
}

// 🏆 RANKING
function renderRanking(stats){
  const container = document.getElementById("ranking");
  container.innerHTML = "";

  const sorted = Object.entries(stats).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  sorted.forEach(([module, count], i)=>{
    const percent = Math.round((count/max)*100);

    container.innerHTML += `
      <div class="card">
        <div class="flex justify-between">
          <div>#${i+1}</div>
          <div class="text-xs">${percent}%</div>
        </div>
        <div class="font-bold mt-2">${module}</div>
        <div class="text-3xl mt-1">${count}</div>
        <div class="w-full bg-white/20 h-2 rounded mt-3">
          <div class="h-2 rounded bg-gradient-to-r from-yellow-400 to-pink-500" style="width:${percent}%"></div>
        </div>
      </div>
    `;
  });
}
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href = "healink.html"; // 🔥 balik ke homepage
  });
}

let visitorChart;

db.collection("pengunjung").onSnapshot(snapshot => {

  let murid = 0;
  let guru = 0;
  let pelawat = 0;

  snapshot.forEach(doc => {

  const d = doc.data();  // ✅ guna d (konsisten)

  // kira jenis pengguna
  if(d.jenis === "Murid") murid++;
  else if(d.jenis === "Guru") guru++;
  else pelawat++;

  // format masa
  const time = d.masa?.toDate().toLocaleString('ms-MY', {
    day: '2-digit',
    month: 'short',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  }) || "-";

  // contoh guna untuk display
  console.log(d.nama, time);

});

  // UPDATE KPI
  document.getElementById("kpiMurid").innerText = murid;
  document.getElementById("kpiGuru").innerText = guru;
  document.getElementById("kpiPelawat").innerText = pelawat;

  // DESTROY CHART LAMA
  if(visitorChart) visitorChart.destroy();

  // CREATE CHART BARU
  visitorChart = new Chart(document.getElementById("visitorChart"), {
    type: 'doughnut',
    data: {
      labels: ["Murid", "Guru", "Pelawat"],
      datasets: [{
        data: [murid, guru, pelawat],
        backgroundColor: [
          "#34d399", // hijau
          "#60a5fa", // biru
          "#f59e0b"  // oren
        ],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            color: "#fff",
            font: { size: 12 }
          }
        }
      }
    }
  });

});

db.collection("aktivitiPelajar")
  .orderBy("masa", "desc")
  .limit(20)
  .onSnapshot(snapshot => {

    const container = document.getElementById("activityList");
    if (!container) return;

    let html = ""; // ✅ elak render berkali-kali

    snapshot.forEach(doc => {

      const d = doc.data();

      // ✅ Format masa (cantik + lengkap)
      const time = d.masa?.toDate().toLocaleString('ms-MY', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }) || "-";

      // ✅ Icon ikut jenis
      let icon = "👤";
      if (d.jenis === "Murid") icon = "🧑‍🎓";
      else if (d.jenis === "Guru") icon = "👨‍🏫";

      html += `
        <div class="bg-white/10 p-4 rounded-xl flex justify-between items-center 
                    hover:bg-white/20 transition duration-300">

          <!-- LEFT -->
          <div>
            <div class="font-semibold text-white text-base">
              ${icon} ${d.nama || "Pengguna"}
            </div>

            <div class="text-xs text-white/70 mt-1">
              ${d.jenis || "-"} • ${d.kelas || d.organisasi || "-"}
            </div>
          </div>

          <!-- RIGHT -->
          <div class="text-right">
            <div class="text-yellow-300 font-semibold">
              ${d.module || "-"}
            </div>

            <div class="text-xs text-white/60 mt-1">
              ${time}
            </div>
          </div>

        </div>
      `;
    });

    container.innerHTML = html; // ✅ render sekali sahaja

  });
</script>

<script>

// ================= FILTER =================
let currentSekolah = "all";
let currentKelas = "all";

function filterSekolah(s){
  currentSekolah = s;
  loadData();
}

function filterKelas(k){
  currentKelas = k;
  loadData();
}


// ================= LOAD DATA (KPI + FILTER) =================
function loadData(){

  db.collection("aktivitiPelajar")
  .orderBy("masa","desc")
  .onSnapshot(snapshot => {

    let murid = 0, guru = 0, pelawat = 0;

    snapshot.forEach(doc => {

      const d = doc.data();

      // 🔥 FILTER SEKOLAH
      if(
  currentSekolah !== "all" &&
  d.organisasi?.toLowerCase().trim() !== currentSekolah.toLowerCase().trim()
) return;

      // 🔥 FILTER KELAS
      if(
  currentKelas !== "all" &&
  d.kelas?.toLowerCase().trim() !== currentKelas.toLowerCase().trim()
) return;

      if(d.jenis === "Murid") murid++;
      else if(d.jenis === "Guru") guru++;
      else pelawat++;

    });

    document.getElementById("kpiMurid").innerText = murid;
    document.getElementById("kpiGuru").innerText = guru;
    document.getElementById("kpiPelawat").innerText = pelawat;

  });

}


// ================= LIVE ACTIVITY =================
db.collection("aktivitiPelajar")
.orderBy("masa", "desc")
.limit(20)
.onSnapshot(snapshot => {

  const container = document.getElementById("activityList");
  if (!container) return;

  let html = "";

  snapshot.forEach(doc => {

    const d = doc.data();

    const time = d.masa?.toDate().toLocaleString('ms-MY', {
      day: '2-digit',
      month: 'short',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    }) || "-";

    let icon = "👤";
    if (d.jenis === "Murid") icon = "🧑‍🎓";
    else if (d.jenis === "Guru") icon = "👨‍🏫";

    html += `
      <div class="bg-white/10 p-4 rounded-xl flex justify-between items-center">

        <div>
          <div class="font-semibold text-white">
            ${icon} ${d.nama || "Pengguna"}
          </div>

          <div class="text-xs text-white/70">
            ${d.jenis || "-"} • ${d.kelas || d.organisasi || "-"}
          </div>
        </div>

        <div class="text-right">
          <div class="text-yellow-300 font-semibold">
            ${d.module || "-"}
          </div>

          <div class="text-xs text-white/60">
            ${time}
          </div>
        </div>

      </div>
    `;
  });

  container.innerHTML = html;

});


// ================= AUTO LOAD =================
window.onload = function(){

  loadData();
  loadSekolah();
  loadKelas();

};

// ================= SEKOLAH =================
function loadSekolah(){

  const container = document.getElementById("listSekolah");
  if(!container) return;

  db.collection("aktivitiPelajar")
  .onSnapshot(snapshot => {

    let sekolahSet = new Set();

    snapshot.forEach(doc => {
      const d = doc.data();
      if(d.organisasi){
        sekolahSet.add(d.organisasi);
      }
    });

    container.innerHTML = "";

    container.innerHTML += `
      <button onclick="filterSekolah('all')" class="sidebar-btn">
        Semua
      </button>
    `;

    [...sekolahSet]
      .map(s => s.trim())
      .sort()
      .forEach(sekolah => {

        container.innerHTML += `
          <button onclick="filterSekolah('${sekolah}')" class="sidebar-btn">
            ${sekolah}
          </button>
        `;
      });

  });

}

// ================= KELAS =================
function loadKelas(){

  const container = document.getElementById("listKelas");
  if(!container) return;

  db.collection("aktivitiPelajar")
  .onSnapshot(snapshot => {

    let kelasSet = new Set();

    snapshot.forEach(doc => {
      const d = doc.data();
      if(d.kelas){
        kelasSet.add(d.kelas);
      }
    });

    container.innerHTML = "";

    container.innerHTML += `
      <button onclick="filterKelas('all')" class="sidebar-btn">
        Semua
      </button>
    `;

    [...kelasSet]
      .map(k => k.trim())
      .sort()
      .forEach(kelas => {

        container.innerHTML += `
          <button onclick="filterKelas('${kelas}')" class="sidebar-btn">
            ${kelas}
          </button>
        `;
      });

  });

}
</script>

</body>
</html>
