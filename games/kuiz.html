<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>HEALINK Kuiz Minda Sihat</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
.fadeIn {
  animation: fadeIn 0.4s ease;
}
</style>

</head>

<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center text-white">

<!-- HEADER -->
<div class="fixed top-0 left-0 w-full flex justify-between px-4 py-3 bg-white/10 backdrop-blur z-50">
  <button onclick="history.back()" class="bg-white/20 px-3 py-1 rounded">← Kembali</button>
  <div>🧠 Kuiz Minda Sihat</div>
  <button onclick="goHome()" class="bg-red-500 px-3 py-1 rounded">✕ Tutup</button>
</div>

<!-- QUIZ BOX -->
<div id="quizBox" class="mt-20 bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-[90%] max-w-2xl fadeIn">

  <!-- TOP -->
  <div class="flex justify-between mb-4 text-sm">
    <span id="noSoalan"></span>
    <span>⭐ Skor: <span id="score">0</span></span>
  </div>

  <!-- PROGRESS -->
  <div class="w-full bg-white/20 rounded-full h-2 mb-6">
    <div id="progressBar" class="bg-green-400 h-2 rounded-full transition-all"></div>
  </div>

  <!-- QUESTION -->
  <h3 id="question" class="mb-6 font-semibold text-lg"></h3>

  <!-- ANSWERS -->
  <div id="answers" class="space-y-3"></div>

</div>

<!-- RESULT POPUP -->
<div id="resultBox" class="hidden fixed inset-0 bg-black/50 backdrop-blur flex items-center justify-center">

  <div class="bg-white text-gray-800 p-8 rounded-xl text-center shadow-xl">

    <h2 class="text-2xl font-bold text-purple-600 mb-3">🎉 Keputusan</h2>

    <p id="finalScore" class="mb-4 text-lg"></p>

    <button onclick="restartGame()" class="px-6 py-2 bg-purple-600 text-white rounded-lg">
      🔁 Cuba Lagi
    </button>

  </div>

</div>

<script>
const soalan = [
{
q: "Apakah yang patut dilakukan apabila berasa tertekan?",
answers: [
{text:"Menyimpan sendiri", correct:false},
{text:"Berkongsi dengan orang dipercayai", correct:true},
{text:"Marah kepada semua orang", correct:false},
{text:"Tidak tidur", correct:false}
]
},
{
q: "Apakah cara terbaik mengawal emosi?",
answers: [
{text:"Tarik nafas dalam", correct:true},
{text:"Jerit kuat", correct:false},
{text:"Abaikan semua", correct:false},
{text:"Marah orang lain", correct:false}
]
},
{
q: "Apakah tanda emosi tidak stabil?",
answers: [
{text:"Tenang", correct:false},
{text:"Mudah marah", correct:true},
{text:"Gembira", correct:false},
{text:"Fokus", correct:false}
]
}
];

let index = 0;
let score = 0;

function loadSoalan(){

  const q = soalan[index];

  document.getElementById("question").innerText = q.q;
  document.getElementById("noSoalan").innerText = `Soalan ${index+1}/${soalan.length}`;
  document.getElementById("score").innerText = score;

  // progress bar
  let percent = ((index)/soalan.length)*100;
  document.getElementById("progressBar").style.width = percent + "%";

  const box = document.getElementById("answers");
  box.innerHTML = "";

  q.answers.forEach(ans=>{
    const btn = document.createElement("button");

    btn.innerText = ans.text;
    btn.className = "w-full p-3 border border-white/30 rounded-lg bg-white/10 hover:bg-white/20 transition text-left";

    btn.onclick = ()=>jawab(btn, ans);

    box.appendChild(btn);
  });
}

function jawab(btn, ans){

  disableAll();

  if(ans.correct){
    btn.classList.add("bg-green-400","text-black");
    score++;
  } else {
    btn.classList.add("bg-red-400","text-black");
  }

  // highlight jawapan betul
  document.querySelectorAll("#answers button").forEach(b=>{
    if(b.innerText === soalan[index].answers.find(a=>a.correct).text){
      b.classList.add("bg-green-400","text-black");
    }
  });

  setTimeout(()=>{
    index++;

    if(index < soalan.length){
      loadSoalan();
    } else {
      showResult();
    }

  },1000);
}

function disableAll(){
  document.querySelectorAll("#answers button").forEach(b=>b.disabled=true);
}

function showResult(){
  document.getElementById("resultBox").classList.remove("hidden");
  document.getElementById("finalScore").innerText = `Skor anda: ${score}/${soalan.length}`;
}

function restartGame(){
  location.reload();
}

function goHome(){
  window.location.href = "../index.html";
}

loadSoalan();
</script>

</body>
</html>
