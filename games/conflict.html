<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>HEALINK - Conflict Resolver</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center text-white">

<!-- HEADER -->
<div class="fixed top-0 left-0 w-full flex justify-between px-4 py-3 bg-white/10 backdrop-blur z-50">
  <button onclick="history.back()" class="bg-white/20 px-3 py-1 rounded">← Kembali</button>
  <div>💬 Conflict Resolver</div>
  <button onclick="location.href='menu.html'" class="bg-red-500 px-3 py-1 rounded">✕ Tutup</button>
</div>

<div id="box" class="mt-20 bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-[90%] max-w-2xl">

  <h3 id="question" class="mb-6 text-lg font-semibold"></h3>

  <div id="answers" class="space-y-3"></div>

  <p id="feedback" class="mt-4 font-semibold"></p>

</div>

<script>
const data = [
{
q:"Kawan menyebarkan cerita tidak benar tentang anda.",
answers:[
{text:"Serang balik", msg:"❌ Ini akan memburukkan keadaan."},
{text:"Bincang secara baik", msg:"✅ Tindakan matang dan terbaik."},
{text:"Abaikan sepenuhnya", msg:"⚠️ Kadang perlu selesaikan secara komunikasi."}
]
},
{
q:"Rakan tidak mahu bekerjasama dalam tugasan kumpulan.",
answers:[
{text:"Marah mereka", msg:"❌ Konflik akan jadi lebih besar."},
{text:"Ajak berbincang", msg:"✅ Cara terbaik menyelesaikan masalah."},
{text:"Buat sendiri sahaja", msg:"⚠️ Tidak menyelesaikan isu sebenar."}
]
}
];

let index=0;

function load(){
const q=data[index];
document.getElementById("question").innerText=q.q;

const box=document.getElementById("answers");
box.innerHTML="";

q.answers.forEach(a=>{
const btn=document.createElement("button");
btn.innerText=a.text;
btn.className="w-full p-3 rounded-lg bg-white/10 hover:bg-white/20";

btn.onclick=()=>{
document.getElementById("feedback").innerText=a.msg;

setTimeout(()=>{
index++;
if(index<data.length){
load();
document.getElementById("feedback").innerText="";
}else{
document.getElementById("box").innerHTML="<h2 class='text-xl'>🎉 Selesai!</h2>";
}
},1200);
};

box.appendChild(btn);
});
}

load();
</script>

<!-- ================= HEADER GAME ================= -->
<div class="fixed top-0 left-0 w-full flex justify-between items-center px-4 py-3 bg-white/10 backdrop-blur text-white z-50">

  <!-- BACK -->
  <button onclick="goBack()" 
    class="bg-white/20 px-3 py-1 rounded hover:bg-white/30 transition">
    ← Kembali
  </button>

  <!-- TITLE -->
  <div class="font-semibold text-sm md:text-base">
    HEALINK Game
  </div>

  <!-- CLOSE -->
  <button onclick="closeGame()" 
    class="bg-red-500 px-3 py-1 rounded hover:bg-red-600 transition">
    ✕ Tutup
  </button>

</div>

</body>
</html>
