<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<title>Dashboard Aktiviti Pelajar</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
  .card { @apply bg-white/20 border border-white/20 backdrop-blur-lg rounded-2xl p-5 shadow-lg; }
</style>
<style>
  body {
    color: #ffffff;
  }
</style>
<style>
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-box {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(12px);
}
</style>
</head>

<body class="bg-gradient-to-r from-purple-700 to-blue-700 text-white min-h-screen p-6">

<!-- 🔐 LOGOUT BUTTON -->
<button onclick="logout()" 
class="fixed top-5 right-5 bg-red-500 hover:bg-red-600 
text-white px-4 py-2 rounded-lg shadow-lg 
hover:scale-105 transition duration-300 z-[9999]">

  🚪 Logout

</button>

  <!-- HEADER -->
  <div class="max-w-6xl mx-auto mb-6">
    <h1 class="text-3xl font-bold text-center">📊 Dashboard Aktiviti Pelajar</h1>
    <p class="text-center text-white/70 mt-1">Analisis penggunaan modul (Real-time)</p>
  </div>

  <!-- FILTER -->
  <div class="max-w-6xl mx-auto mb-6 grid md:grid-cols-3 gap-4">
    <div class="card">
      <label class="text-sm opacity-80">Dari</label>
      <input id="fromDate" type="date" class="w-full mt-1 p-2 rounded text-black">
    </div>
    <div class="card">
      <label class="text-sm opacity-80">Hingga</label>
      <input id="toDate" type="date" class="w-full mt-1 p-2 rounded text-black">
    </div>
    <div class="card flex items-end">
      <button onclick="applyFilter()" class="w-full bg-white/20 hover:bg-white/30 rounded-xl p-2">
        Tapis Data
      </button>
    </div>
  </div>

  <!-- ================= PENGUNJUNG ================= -->
<div class="max-w-6xl mx-auto section-box">

  <div class="section-title">👥 Analisis Pengunjung</div>

  <div class="grid md:grid-cols-2 gap-6 items-center">

    <!-- KPI -->
    <div class="grid grid-cols-3 gap-4 text-center">

      <div>
        <div class="text-xs text-white/70">👨‍🎓 Murid</div>
        <div id="kpiMurid" class="text-2xl font-bold">0</div>
      </div>

      <div>
        <div class="text-xs text-white/70">👨‍🏫 Guru</div>
        <div id="kpiGuru" class="text-2xl font-bold">0</div>
      </div>

      <div>
        <div class="text-xs text-white/70">👤 Pelawat</div>
        <div id="kpiPelawat" class="text-2xl font-bold">0</div>
      </div>

    </div>

    <!-- CHART -->
    <div class="h-44">
      <canvas id="visitorChart"></canvas>
    </div>

  </div>

</div>

    <!-- CHART -->
    <div class="card">
      <div class="h-56">
        <canvas id="visitorChart"></canvas>
      </div>
    </div>

  </div>

</div>
  <!-- KPI -->
  <div class="max-w-6xl mx-auto section-box">

  <div class="section-title">📊 Ringkasan Sistem</div>

  <div class="grid md:grid-cols-4 gap-4 text-center">

    <div>
      <div class="text-xs text-white/70">Jumlah Interaksi</div>
      <div id="kpiTotal" class="text-2xl font-bold">0</div>
    </div>

    <div>
      <div class="text-xs text-white/70">Modul Aktif</div>
      <div id="kpiModules" class="text-2xl font-bold">0</div>
    </div>

    <div>
      <div class="text-xs text-white/70">Top Modul</div>
      <div id="kpiTop" class="text-2xl font-bold">-</div>
    </div>

    <div>
      <div class="text-xs text-white/70">Purata / Modul</div>
      <div id="kpiAvg" class="text-2xl font-bold">0</div>
    </div>

  </div>

</div>

  <!-- CHART -->
  <div class="max-w-6xl mx-auto section-box">

  <div class="section-title">📈 Analisis Modul</div>

  <div class="grid md:grid-cols-2 gap-6 items-center">

    <div class="h-64">
      <canvas id="barChart"></canvas>
    </div>

    <div class="h-64">
      <canvas id="pieChart"></canvas>
    </div>

  </div>

</div>

<div class="max-w-6xl mx-auto section-box">

  <div class="section-title">🏆 Ranking Modul</div>

  <div id="ranking" class="grid md:grid-cols-3 gap-4"></div>

</div>

<script>
// 🔥 CONFIG (guna config cikgu)
const firebaseConfig = {
  apiKey: "AIzaSyA9R5jKqeJNvBHD-SIOuseAqyb_x909R3Q",
  authDomain: "bimbingankaunselingskkk.firebaseapp.com",
  projectId: "bimbingankaunselingskkk"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// STATE
let rawData = [];
let stats = {};
let barChart, pieChart;

// 📡 REALTIME LISTENER
db.collection("aktivitiPelajar").onSnapshot(snapshot => {
  rawData = [];
  snapshot.forEach(doc => rawData.push(doc.data()));
  computeAndRender();
});

// 🔎 FILTER TARIKH
function applyFilter(){
  computeAndRender();
}

function inRange(date){
  const from = document.getElementById('fromDate').value;
  const to   = document.getElementById('toDate').value;

  if(!from && !to) return true;

  const d = new Date(date?.seconds ? date.seconds*1000 : date);
  if(from){
    const f = new Date(from + "T00:00:00");
    if(d < f) return false;
  }
  if(to){
    const t = new Date(to + "T23:59:59");
    if(d > t) return false;
  }
  return true;
}

// 🧠 COMPUTE
function computeAndRender(){
  stats = {};
  let total = 0;

  rawData.forEach(d => {
    if(!inRange(d.masa)) return;

    const m = d.module || "Lain";
    if(!stats[m]) stats[m] = 0;
    stats[m]++;
    total++;
  });

  renderKPI(stats, total);
  renderCharts(stats);
  renderRanking(stats);
}

// 📊 KPI
function renderKPI(stats, total){
  const modules = Object.keys(stats).length;
  const sorted = Object.entries(stats).sort((a,b)=>b[1]-a[1]);
  const top = sorted[0]?.[0] || "-";
  const avg = modules ? Math.round(total/modules) : 0;

  document.getElementById("kpiTotal").innerText = total;
  document.getElementById("kpiModules").innerText = modules;
  document.getElementById("kpiTop").innerText = top;
  document.getElementById("kpiAvg").innerText = avg;
}

// 📈 CHART
function renderCharts(stats){
  const labels = Object.keys(stats);
  const data = Object.values(stats);

  // destroy lama
  if(barChart) barChart.destroy();
  if(pieChart) pieChart.destroy();

  // BAR
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Jumlah Klik',
        data
      }]
    },
   options: {
  plugins: {
    legend: {
      labels: {
        color: "#ffffff"
      }
    }
  },
  scales: {
    x: {
      ticks: { color: "#ffffff" }
    },
    y: {
      ticks: { color: "#ffffff" }
    }
  }
}
  });

  // PIE
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: {
      labels,
      datasets: [{ data }]
    }
  });
}

// 🏆 RANKING
function renderRanking(stats){
  const container = document.getElementById("ranking");
  container.innerHTML = "";

  const sorted = Object.entries(stats).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  sorted.forEach(([module, count], i)=>{
    const percent = Math.round((count/max)*100);

    container.innerHTML += `
      <div class="card">
        <div class="flex justify-between">
          <div>#${i+1}</div>
          <div class="text-xs">${percent}%</div>
        </div>
        <div class="font-bold mt-2">${module}</div>
        <div class="text-3xl mt-1">${count}</div>
        <div class="w-full bg-white/20 h-2 rounded mt-3">
          <div class="h-2 rounded bg-gradient-to-r from-yellow-400 to-pink-500" style="width:${percent}%"></div>
        </div>
      </div>
    `;
  });
}
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const ADMIN_EMAILS = [
  "fitrieusop@moe.gov.my"
];

firebase.auth().onAuthStateChanged(user => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // 🔐 CHECK GURU SAHAJA
  if (!ADMIN_EMAILS.includes(user.email)) {
    alert("Akses terhad untuk guru sahaja");
    firebase.auth().signOut();
    window.location.href = "login.html";
  }

});
</script>

<script>
function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href = "healink.html"; // 🔥 balik ke homepage
  });
}

let visitorChart;

db.collection("pengunjung").onSnapshot(snapshot => {

  let murid = 0;
  let guru = 0;
  let pelawat = 0;

  snapshot.forEach(doc => {
    const data = doc.data();

    if(data.jenis === "Murid") murid++;
    else if(data.jenis === "Guru") guru++;
    else pelawat++;
  });

  // UPDATE KPI
  document.getElementById("kpiMurid").innerText = murid;
  document.getElementById("kpiGuru").innerText = guru;
  document.getElementById("kpiPelawat").innerText = pelawat;

  // DESTROY CHART LAMA
  if(visitorChart) visitorChart.destroy();

  // CREATE CHART BARU
  visitorChart = new Chart(document.getElementById("visitorChart"), {
    type: 'doughnut',
    data: {
      labels: ["Murid", "Guru", "Pelawat"],
      datasets: [{
        data: [murid, guru, pelawat],
        backgroundColor: [
          "#34d399", // hijau
          "#60a5fa", // biru
          "#f59e0b"  // oren
        ],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            color: "#fff",
            font: { size: 12 }
          }
        }
      }
    }
  });

});
</script>

</body>
</html>
