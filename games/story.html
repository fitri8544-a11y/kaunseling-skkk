<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>HEALINK - Life Scenario</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center text-white">

<!-- HEADER -->
<div class="fixed top-0 left-0 w-full flex justify-between px-4 py-3 bg-white/10 backdrop-blur z-50">
  <button onclick="history.back()" class="bg-white/20 px-3 py-1 rounded">← Kembali</button>
  <div>📖 Life Scenario</div>
  <button onclick="location.href='menu.html'" class="bg-red-500 px-3 py-1 rounded">✕ Tutup</button>
</div>

<div id="storyBox" class="mt-20 bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-[90%] max-w-2xl">

  <p id="story" class="mb-6 text-lg"></p>

  <div id="choices" class="space-y-3"></div>

</div>

<script>
const storyData = [
{
text:"Ali berasa tertekan kerana banyak kerja sekolah.",
choices:[
{t:"Rehat dan buat jadual", next:1},
{t:"Abaikan semua kerja", next:2}
]
},
{
text:"Ali berjaya mengurus masa dengan baik dan stress berkurang.",
choices:[{t:"Tamat", next:-1}]
},
{
text:"Ali semakin tertekan kerana kerja semakin banyak.",
choices:[{t:"Tamat", next:-1}]
}
];

let current=0;

function load(){
const s=storyData[current];

document.getElementById("story").innerText=s.text;

const box=document.getElementById("choices");
box.innerHTML="";

s.choices.forEach(c=>{
const btn=document.createElement("button");
btn.innerText=c.t;
btn.className="w-full p-3 rounded-lg bg-white/10 hover:bg-white/20";

btn.onclick=()=>{
if(c.next==-1){
document.getElementById("storyBox").innerHTML="<h2>🎉 Tamat Cerita</h2>";
}else{
current=c.next;
load();
}
};

box.appendChild(btn);
});
}

load();
</script>

<!-- ================= HEADER GAME ================= -->
<div class="fixed top-0 left-0 w-full flex justify-between items-center px-4 py-3 bg-white/10 backdrop-blur text-white z-50">

  <!-- BACK -->
  <button onclick="goBack()" 
    class="bg-white/20 px-3 py-1 rounded hover:bg-white/30 transition">
    ← Kembali
  </button>

  <!-- TITLE -->
  <div class="font-semibold text-sm md:text-base">
    HEALINK Game
  </div>

  <!-- CLOSE -->
  <button onclick="closeGame()" 
    class="bg-red-500 px-3 py-1 rounded hover:bg-red-600 transition">
    ✕ Tutup
  </button>

</div>

</body>
</html>
