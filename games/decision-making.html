<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-600 flex items-center justify-center min-h-screen text-white">

<div class="bg-white text-gray-800 p-8 rounded-xl text-center max-w-xl">

<h1 class="text-xl font-bold mb-4">⚖️ Decision Making</h1>

<p class="mb-4">Anda stress dengan kerja sekolah</p>

<button onclick="choose(1)" class="block w-full mb-2 bg-green-200 p-2 rounded">Buat sedikit demi sedikit</button>
<button onclick="choose(0)" class="block w-full mb-2 bg-red-200 p-2 rounded">Abaikan semua</button>
<button onclick="choose(0)" class="block w-full bg-yellow-200 p-2 rounded">Main game sahaja</button>

<p id="result" class="mt-4"></p>

</div>

<script>
function choose(val){
if(val){
document.getElementById("result").innerText="✅ Pilihan bijak!";
}else{
document.getElementById("result").innerText="❌ Cuba lagi";
}
}
</script>

<!-- ================= HEADER GAME ================= -->
<div class="fixed top-0 left-0 w-full flex justify-between items-center px-4 py-3 bg-white/10 backdrop-blur text-white z-50">

  <!-- BACK -->
  <button onclick="goBack()" 
    class="bg-white/20 px-3 py-1 rounded hover:bg-white/30 transition">
    ← Kembali
  </button>

  <!-- TITLE -->
  <div class="font-semibold text-sm md:text-base">
    HEALINK Game
  </div>

  <!-- CLOSE -->
  <button onclick="closeGame()" 
    class="bg-red-500 px-3 py-1 rounded hover:bg-red-600 transition">
    ✕ Tutup
  </button>

</div>

<script>
function goBack(){
  window.history.back();
}

function closeGame(){
  window.location.href = "../healink.html"; 
}
</script>

</body>
</html>
