<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HEALINK Update</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* BACKGROUND */
body {
  background: linear-gradient(135deg, #5b21b6, #6366f1, #3b82f6);
  overflow: hidden;
}

/* FLOAT ANIMATION */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* FADE IN */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1;}
}

/* PROGRESS BAR */
@keyframes loadBar {
  from {width:0%;}
  to {width:100%;}
}

/* GLOW TEXT */
.glow {
  text-shadow: 0 0 15px rgba(255,255,255,0.6);
}

.animate-float { animation: float 3s ease-in-out infinite; }
.animate-fade { animation: fadeIn 0.8s ease; }
.progress { animation: loadBar 6s linear forwards; }

</style>

</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="text-center max-w-md px-6 animate-fade">

  <!-- ICON -->
  <div class="text-6xl mb-4 animate-float">🔄</div>

  <!-- TITLE -->
  <h1 class="text-3xl font-bold glow">
    HEALINK 2.0
  </h1>

  <p class="mt-2 text-white/80">
    Sistem telah dinaik taraf
  </p>

  <!-- MESSAGE -->
  <div class="mt-6 bg-white/10 backdrop-blur-lg p-4 rounded-xl">

    <p class="text-sm mb-3">
      Anda sedang menggunakan pautan lama
    </p>

    <div class="text-red-300 text-xs mb-2">
      bimbingankaunselingskkk.web.app/healink.html
    </div>

    <div class="text-green-300 text-sm font-semibold">
      ➜ attendantanjungkasihskkk.web.app
    </div>

  </div>

  <!-- PROGRESS BAR -->
  <div class="mt-6 w-full bg-white/20 rounded-full h-2 overflow-hidden">
    <div class="bg-green-400 h-2 progress"></div>
  </div>

  <!-- TEXT -->
  <p class="text-xs mt-3 text-white/70">
    Mengalihkan ke sistem baharu...
  </p>

  <!-- BUTTON -->
  <button onclick="goNow()" 
    class="mt-6 bg-white text-black px-6 py-3 rounded-xl font-semibold 
           hover:scale-105 transition shadow-lg">

    🚀 Pergi Sekarang

  </button>

</div>

<script>

// BUTTON MANUAL

</script>

</body>
</html>
