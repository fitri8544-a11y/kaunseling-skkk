<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Daftar Pengunjung</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center text-white">

<div class="bg-white/10 backdrop-blur-lg p-8 rounded-3xl shadow-xl w-[90%] max-w-lg">

  <h2 class="text-2xl font-bold mb-6 text-center">
    📝 Daftar Pengunjung
  </h2>

  <!-- JENIS -->
  <p class="mb-3 text-white/90">Jenis Pengunjung:</p>

  <div class="grid grid-cols-3 gap-3 mb-6">

    <button onclick="selectJenis('Murid')" id="btnMurid"
      class="p-3 rounded-xl bg-white/20 hover:bg-green-400/30 transition">
      🎒 Murid
    </button>

    <button onclick="selectJenis('Guru')" id="btnGuru"
      class="p-3 rounded-xl bg-white/20 hover:bg-blue-400/30 transition">
      👨‍🏫 Guru
    </button>

    <button onclick="selectJenis('Pelawat')" id="btnPelawat"
      class="p-3 rounded-xl bg-white/20 hover:bg-yellow-400/30 transition">
      👤 Pelawat
    </button>

  </div>

  <!-- NAMA -->
  <input id="nama" type="text" placeholder="Nama"
    class="w-full p-3 mb-4 rounded-lg text-black">

  <!-- KELAS -->
  <input id="kelas" type="text" placeholder="Kelas (contoh: 5 Bestari)"
    class="w-full p-3 mb-6 rounded-lg text-black">

  <!-- BUTTON -->
  <button onclick="submitDaftar()"
  class="w-full bg-gradient-to-r from-purple-500 to-blue-500 p-3 rounded-xl font-semibold hover:scale-105 transition">
  ✨ Daftar Sekarang
</button>

  <p id="msg" class="text-center mt-4 text-green-300"></p>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA9R5jKqeJNvBHD-SIOuseAqyb_x909R3Q",
  authDomain: "bimbingankaunselingskkk.firebaseapp.com",
  projectId: "bimbingankaunselingskkk"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// STATE
let jenisDipilih = "";

// PILIH JENIS
function selectJenis(jenis){

  jenisDipilih = jenis;

  // reset warna
  document.querySelectorAll("button").forEach(btn=>{
    btn.classList.remove("bg-green-400","bg-blue-400","bg-yellow-400");
  });

  if(jenis === "Murid"){
    document.getElementById("btnMurid").classList.add("bg-green-400");
  }

  if(jenis === "Guru"){
    document.getElementById("btnGuru").classList.add("bg-blue-400");
  }

  if(jenis === "Pelawat"){
    document.getElementById("btnPelawat").classList.add("bg-yellow-400");
  }

}

// DAFTAR
function daftar(){

  const nama = document.getElementById("nama").value;
  const kelas = document.getElementById("kelas").value;

  if(!jenisDipilih || !nama){
    alert("Sila lengkapkan maklumat");
    return;
  }

  db.collection("pengunjung").add({
    jenis: jenisDipilih,
    nama: nama,
    kelas: kelas,
    masa: new Date()
  })
  .then(()=>{
    document.getElementById("msg").innerText = "✅ Berjaya didaftarkan";

    // reset
    document.getElementById("nama").value = "";
    document.getElementById("kelas").value = "";
  });

}

</script>

</body>
</html>
